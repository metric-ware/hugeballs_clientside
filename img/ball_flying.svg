<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="meteorBody" cx="35%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#9a9488"/>
            <stop offset="55%" stop-color="#6e685f"/>
            <stop offset="100%" stop-color="#4a4641"/>
        </radialGradient>

        <radialGradient id="craterFill" cx="35%" cy="35%" r="70%">
            <stop offset="0%" stop-color="#4e4944"/>
            <stop offset="100%" stop-color="#2a2724"/>
        </radialGradient>
    </defs>

    <!-- Meteor body -->
    <circle cx="64" cy="64" r="52" fill="url(#meteorBody)" stroke="#2b2926" stroke-width="5"/>

    <!-- Background lighting/shadow -->
    <ellipse cx="48" cy="40" rx="20" ry="12" fill="#d7d1c5" opacity="0.10"/>
    <ellipse cx="68" cy="88" rx="24" ry="14" fill="#1c1a18" opacity="0.10"/>

    <!-- Craters -->
    <g>
        <circle cx="42" cy="44" r="11" fill="url(#craterFill)"/>
        <circle cx="42" cy="44" r="11" fill="none" stroke="#b3ab9d" stroke-width="3"/>

        <circle cx="86" cy="48" r="8" fill="url(#craterFill)"/>
        <circle cx="86" cy="48" r="8" fill="none" stroke="#a79f92" stroke-width="2.5"/>

        <circle cx="78" cy="86" r="13" fill="url(#craterFill)"/>
        <circle cx="78" cy="86" r="13" fill="none" stroke="#b0a89b" stroke-width="3"/>

        <circle cx="40" cy="78" r="6" fill="url(#craterFill)"/>
        <circle cx="40" cy="78" r="6" fill="none" stroke="#9c9488" stroke-width="2"/>
    </g>

    <!-- Strong outer outline -->
    <circle cx="64" cy="64" r="52" fill="none" stroke="#24221f" stroke-width="5"/>
</svg>
