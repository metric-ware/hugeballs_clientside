<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Red half gradient -->
        <linearGradient id="magnetRedSide" x1="20%" y1="12%" x2="85%" y2="90%">
            <stop offset="0%" stop-color="#ffaaa2"/>
            <stop offset="28%" stop-color="#ff5f58"/>
            <stop offset="62%" stop-color="#df2f2f"/>
            <stop offset="100%" stop-color="#9f1b20"/>
        </linearGradient>

        <!-- Blue half gradient -->
        <linearGradient id="magnetBlueSide" x1="20%" y1="12%" x2="85%" y2="90%">
            <stop offset="0%" stop-color="#a7e4ff"/>
            <stop offset="28%" stop-color="#5cabff"/>
            <stop offset="62%" stop-color="#2d73e6"/>
            <stop offset="100%" stop-color="#173f99"/>
        </linearGradient>

        <!-- Metallic plus gradient -->
        <linearGradient id="magnetMetalPlus" x1="20%" y1="10%" x2="85%" y2="95%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="28%" stop-color="#dfe5ec"/>
            <stop offset="62%" stop-color="#aeb8c4"/>
            <stop offset="100%" stop-color="#717d89"/>
        </linearGradient>
    </defs>

    <!-- Base ball shape -->
    <circle cx="64" cy="64" r="52" fill="#202832"/>

    <!-- Red left half, drawn as an actual semicircle -->
    <path
        d="M64 12
        A52 52 0 0 0 64 116
        Z"
        fill="url(#magnetRedSide)"
        />

    <!-- Blue right half, drawn as an actual semicircle -->
    <path
        d="M64 12
        A52 52 0 0 1 64 116
        Z"
        fill="url(#magnetBlueSide)"
        />

    <!-- Center magnetic plus -->
    <path
        d="M56 30
        H72
        V55
        H98
        V73
        H72
        V98
        H56
        V73
        H30
        V55
        H56
        Z"
        fill="url(#magnetMetalPlus)"
        stroke="#313b46"
        stroke-width="4"
        stroke-linejoin="round"
        />

    <!-- Strong outer outline -->
    <circle cx="64" cy="64" r="52" fill="none" stroke="#151b23" stroke-width="5"/>
</svg>
