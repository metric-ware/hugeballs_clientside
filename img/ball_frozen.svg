<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="frozenBallBody" cx="35%" cy="28%" r="75%">
            <stop offset="0%" stop-color="#eefcff"/>
            <stop offset="55%" stop-color="#8edcf4"/>
            <stop offset="100%" stop-color="#3d8fbd"/>
        </radialGradient>

        <radialGradient id="iceHighlight" cx="30%" cy="24%" r="45%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </radialGradient>

        <clipPath id="ballClip">
            <circle cx="64" cy="64" r="52"/>
        </clipPath>
    </defs>

    <!-- Main ball body -->
    <circle cx="64" cy="64" r="52" fill="url(#frozenBallBody)" stroke="#2a6f95" stroke-width="5"/>

    <!-- All inner details are clipped to stay inside the circle -->
    <g clip-path="url(#ballClip)">
        <!-- Soft icy highlight -->
        <circle cx="46" cy="40" r="24" fill="url(#iceHighlight)"/>

        <!-- Clean frozen symbol -->
        <g stroke="#eafcff" stroke-width="6" stroke-linecap="round" opacity="0.95">
            <line x1="64" y1="38" x2="64" y2="90"/>
            <line x1="46" y1="48" x2="82" y2="80"/>
            <line x1="46" y1="80" x2="82" y2="48"/>
        </g>
    </g>

    <!-- Strong outer outline -->
    <circle cx="64" cy="64" r="52" fill="none" stroke="#1f5674" stroke-width="5"/>
</svg>
