<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="starterSquareBody" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="55%" stop-color="#edf1f5"/>
            <stop offset="100%" stop-color="#c8d0d8"/>
        </radialGradient>
    </defs>

    <!-- Main square body -->
    <rect x="12" y="12" width="104" height="104" rx="12" ry="12"
