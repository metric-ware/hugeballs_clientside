<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Red left-half gradient -->
        <linearGradient id="redSide" x1="20%" y1="12%" x2="85%" y2="90%">
            <stop offset="0%" stop-color="#ffaaa2"/>
            <stop offset="28%" stop-color="#ff5f58"/>
            <stop offset="62%" stop-color="#df2f2f"/>
            <stop offset="100%" stop-color="#9f1b20"/>
        </linearGradient>

        <!-- Blue right-half gradient -->
        <linearGradient id="blueSide" x1="20%" y1="12%" x2="85%" y2="90%">
            <stop offset="0%" stop-color="#a7e4ff"/>
            <stop offset="28%" stop-color="#5cabff"/>
            <stop offset="62%" stop-color="#2d73e6"/>
            <stop offset="100%" stop-color="#173f99"/>
        </linearGradient>
    </defs>

    <!-- Left half: exact 50% -->
    <path
        d="M24 12
        H64
        V116
        H24
        Q12 116 12 104
        V24
        Q12 12 24 12
        Z"
        fill="url(#redSide)"
        />

    <!-- Right half: exact 50% -->
    <path
        d="M64 12
        H104
        Q116 12 116 24
        V104
        Q116 116 104 116
        H64
        Z"
        fill="url(#blueSide)"
        />

    <!-- Larger upward chevron indicator -->
    <path d="M33 82 L64 46 L95 82"
          fill="none"
          stroke="#eef4ff"
          stroke-width="6"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Strong outer outline -->
    <rect x="12" y="12" width="104" height="104" rx="12" ry="12"
          fill="none" stroke="#151b23" stroke-width="5"/>
    </svg>
