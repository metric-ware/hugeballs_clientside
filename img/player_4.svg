<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="squareBody" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#d8ff6b"/>
            <stop offset="55%" stop-color="#94d82d"/>
            <stop offset="100%" stop-color="#4f8f16"/>
        </radialGradient>
    </defs>

    <!-- Main square body -->
    <rect x="12" y="12" width="104" height="104" rx="12" ry="12"
          fill="url(#squareBody)" stroke="#365f10" stroke-width="5"/>

    <!-- Larger upward chevron indicator -->
    <path d="M33 82 L64 46 L95 82"
          fill="none"
          stroke="#f0ffb8"
          stroke-width="6"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Strong outer outline -->
    <rect x="12" y="12" width="104" height="104" rx="12" ry="12"
          fill="none" stroke="#2f520d" stroke-width="5"/>
    </svg>
