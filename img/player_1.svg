<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="squareBody" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#d7dce1"/>
            <stop offset="55%" stop-color="#9aa3ad"/>
            <stop offset="100%" stop-color="#69737d"/>
        </radialGradient>
    </defs>

    <!-- Main square body -->
    <rect x="12" y="12" width="104" height="104" rx="12" ry="12"
          fill="url(#squareBody)" stroke="#5b6570" stroke-width="5"/>

    <!-- Larger upward chevron indicator -->
